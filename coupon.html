  <!-- 公共头部 -->

    <div class="header-left">
      <img src="images/shop-avatar.jpg" alt="店铺头像" class="shop-avatar">
      <div class="shop-info">
        <div class="shop-name">测试饭店1</div>
        <div class="shop-greet">欢迎光临</div>

  <!-- 优惠券内容 -->
  <div class="coupon-section">

    <!-- 第1张优惠券 -->

        <p>全部商品无门槛可用</p>
        <p style="font-size:14px; opacity:0.8;">测试饭店1</p>
      </div>
      <div class="coupon-right">领取</div>
    </div>

    <!-- 第2张优惠券 -->
    <div class="coupon-card">
      <div class="coupon-left">20元</div>
      <div class="coupon-middle">
        <h3>满100减20</h3>
        <p>全部商品无门槛可用</p>
        <p style="font-size:14px; opacity:0.8;">测试饭店1</p>
      </div>
      <div class="coupon-right">领取</div>
    </div>
  </div>

  <!-- 底部提示 -->
  <div class="tip-text">
    领取后请在有效期内使用，到店消费时向店员出示即可享受优惠
  </div>

  <!-- 底部Tab导航（当前页面高亮：优惠券） -->

    <a href="index.html" class="nav-item">

    </a>
    <a href="mine.html" class="nav-item">
      <span class="nav-icon">👤</span>
      <span class="nav-text">我的</span>
