<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生活服务</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* 适配原有页面的报名表样式 */
    .module-title {
      font-size: 22px;
      font-weight: bold;
      color: #333;
      text-align: center;
      padding: 15px 0;
      background-color: #e0e6c8; /* 呼应图片的草地色 */
      margin-bottom: 0;
    }
    .form-container {
      background-color: white;
      padding: 20px;
    }
    .welcome-text {
      font-size: 16px;
      color: #333;
      margin-bottom: 25px;
      line-height: 1.6;
    }
    .form-item {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      font-size: 17px;
      color: #333;
      margin-bottom: 8px;
    }
    .form-label .required {
      color: #f44336; /* 必填星号红色 */
      margin-right: 4px;
    }
    .form-input {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 16px;
    }
    .form-input:focus {
      outline: none;
      border-color: #81c784; /* 绿色焦点高亮 */
    }
    /* 单选按钮组样式 */
    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .radio-option {
      display: flex;
      align-items: center;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    .radio-option input {
      margin-right: 10px;
      width: 18px;
      height: 18px;
    }
    /* 下拉框样式 */
    .form-select {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 16px;
      background-color: white;
      appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg fill="%23666" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');
      background-repeat: no-repeat;
      background-position: right 15px center;
      background-size: 16px;
    }
    /* 地址组（下拉+文本框） */
    .address-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    /* 家长信息组 */
    .parent-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    /* 提交按钮 */
    .submit-btn {
      width: 100%;
      padding: 15px;
      background-color: #4caf50;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }
    .submit-btn:hover {
      background-color: #43a047;
    }
    /* 顶部卡通Banner */
    .form-banner {
      width: 100%;
      height: 180px;
      background: linear-gradient(to bottom, #bbdefb, #c8e6c9);
      position: relative;
      overflow: hidden;
    }
    .form-banner-illustration {
      width: 100%;
      height: 100%;
      /* 示例插画，可替换为你自己的图片 */
      background-image: url('https://img.icons8.com/color/96/000000/kid-on-bike.png');
      background-repeat: no-repeat;
      background-position: right center;
      background-size: 150px;
    }

    /* ========== 新增：顶部标题栏返回功能样式 ========== */
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 15px 20px;
      background-color: #f5f5f5;
      font-size: 20px;
      font-weight: bold;
      color: #333;
      position: relative;
      border-bottom: 1px solid #eee;
    }
    /* 返回按钮样式 */
    .back-btn {
      position: absolute;
      left: 20px;
      font-size: 18px;
      color: #4caf50;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .back-btn:hover {
      color: #43a047;
    }
  </style>
</head>
<body>
<!-- ========== 修改：顶部标题增加返回按钮 ========== -->
<div class="header">
  <div class="back-btn" onclick="javascript:history.back(-1);">返回</div>
  金桥社区服务
</div>

<div class="module" style="min-height: auto;">
  <!-- 顶部卡通Banner -->
  <div class="form-banner">
    <div class="form-banner-illustration"></div>
  </div>
  <!-- 模块标题 -->
  <div class="module-title">享碰AI智慧生活进社区啦</div>
  <!-- 表单主体 -->
  <div class="form-container">
    <!-- 欢迎语 -->
    <p class="welcome-text">
享碰AI活动进社区开启✨</p>
👉参与对象：辖区所有住户</p>
👉活动项目：体验碰一碰AI，免费领取精美礼品、肉蛋奶等</p>
   社区联动，商家优惠，传递社区温情，欢迎各位积极参加！</p>

   
  </div>
</div>
</body>
</html>
