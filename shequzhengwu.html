<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>“社区政务</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background-color: #f5f5f5;
            padding-bottom: 70px; /* 防止内容被底部栏遮挡 */
        }

        /* 顶部导航栏 */
        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background-color: #ffffff;
            border-bottom: 1px solid #eee;
        }
        /* ✅ 统一修改：返回按钮样式（和报修页面完全一致） */
        .back-btn {
            font-size: 18px;
            color: #007bff;
            cursor: pointer;
        }
        .back-btn:hover {
            color: #0056b3;
        }
        .nav-btn {
            font-size: 1.2rem;
            color: #333;
            background: none;
            border: none;
            cursor: pointer;
        }
        .nav-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
        }

        /* Banner区域 - 紫色渐变背景 */
        .banner {
            background: linear-gradient(180deg, #0830b4 0%, #6b83c7 100%);
            padding: 40px 20px;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }
        /* 背景菱形纹理效果 */
        .banner::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0h20v20H0V0zm10 10h10v10H10V10zM0 10h10v10H0V10zM10 0h10v10H10V0z' fill='%23ffffff' fill-opacity='0.1' fill-rule='evenodd'/%3E%3C/svg%3E");
            opacity: 0.3;
        }
        .banner-title {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }
        .banner-subtitle {
            background-color: #FFD166;
            color: #333;
            border: none;
            border-radius: 25px;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }
        /* Banner商品展示区 */
        .banner-products {
            display: flex;
            justify-content: space-around;
            position: relative;
            z-index: 1;
        }
        .product-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .product-platform {
            width: 140px;
            height: 60px;
            background-color: #2046af;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -30px;
        }
        .product-img {
            width: 80px;
            height: auto;
            background-color: rgba(255, 255, 255, 0);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            padding: 5px;
        }

        /* 活动列表区域 */
        .activity-list {
            padding: 16px;
        }
        .activity-item {
            display: flex;
            align-items: center;
            background-color: white;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .item-img {
            width: 120px;
            height: 80px;
            background-color: #112596;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            position: relative;
            overflow: hidden;
        }
        .item-img::before {
            content: "";
            font-size: 1.2rem;
            font-weight: bold;
            position: absolute;
            top: 10px;
            left: 10px;
        }
        .item-info {
            flex: 1;
            padding: 0 16px;
        }
        .item-info h3 {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 8px;
        }
        .item-info p {
            color: #666;
            font-size: 0.95rem;
        }
        .btn-view {
            background-color: #2852dd;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 10px 24px;
            font-size: 1rem;
            cursor: pointer;
        }
        

        /* 底部互动栏 */
        .footer-bar {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background-color: white;
            border-top: 1px solid #eee;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
        }
        .input-box {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #ddd;
            border-radius: 20px;
            margin-right: 16px;
            font-size: 1rem;
        }
        .actions {
            display: flex;
            gap: 24px;
        }
        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #666;
            font-size: 0.9rem;
        }
        .icon {
            width: 20px;
            height: 20px;
            background-color: #666;
            border-radius: 2px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <div class="top-nav">
        <!-- ✅ 统一修改：返回按钮（功能+样式和报修页面一致） -->
        <div class="back-btn" onclick="javascript:history.back(-1);">返回</div>
        <div class="nav-title">社区政务</div>
        <button class="nav-btn">⋯</button>
    </div>

    <!-- Banner区域 -->
    <div class="banner">
        <h1 class="banner-title">社区监督电话</h1>
        <button class="banner-subtitle">热线：4006669999</button>
        <div class="banner-products">
        </div>
    </div>

    <!-- 活动列表 -->
    <div class="activity-list">
        <div class="activity-item">
            <div class="item-img">
                <div class="product-img">党员活动</div>
            </div>
            <div class="item-info">
                <h3>先进旗手</h3>
                <p>当前：王子豪</p>
            </div>
            <button class="btn-view">详情</button>
        </div>
        <div class="activity-item">
            <div class="item-img">
                <div class="product-img">事务公开</div>
            </div>
            <div class="item-info">
                <h3>公开信息</h3>
                <p>监督人：孙小虎</p>
            </div>
            <button class="btn-view">查询</button>
        </div>
        <div class="activity-item">
            <div class="item-img">
                <div class="product-img">上岗竞聘</div>
            </div>
            <div class="item-info">
                <h3>招聘事项</h3>
                <p>负责人：赵昊仁</p>
            </div>
            <button class="btn-view">查看</button>
        </div>
                <div class="activity-item">
            <div class="item-img">
                <div class="product-img">意见建议</div>
            </div>
            <div class="item-info">
                <h3>意见箱</h3>
                <p>监督人：李坐堂</p>
            </div>
            <button class="btn-view">提交</button>
        </div>
                <div class="activity-item">
            <div class="item-img">
                <div class="product-img">反腐举报</div>
            </div>
            <div class="item-info">
                <h3>人人有责</h3>
                <p>负责人：周责贵</p>
            </div>
            <button class="btn-view">反馈</button>
        </div>
    </div>

</body>
</html>
